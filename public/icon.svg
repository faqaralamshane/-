    <path fill-rule="evenodd" d="M 256,100 C 322.27,100 376,153.73 376,220 C 376,286.27 322.27,340 256,340 C 189.73,340 136,286.27 136,220 C 136,153.73 189.73,100 256,100 Z M 256,155 C 291.9,155 321,184.1 321,220 C 321,255.9 291.9,285 256,285 C 220.1,285 191,255.9 191,220 C 191,184.1 220.1,155 256,155 Z" />
    
